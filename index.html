<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shitty Stock System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    #cameraFeed {
      width: 100%;
      height: 250px;
      position: relative;
      overflow: hidden;
    }

    #cameraFeed video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }

    #multiScanCamera {
      width: 100%;
      height: 250px;
      position: relative;
      overflow: hidden;
    }

    #multiScanCamera video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background-color: white;
      padding: 30px;
      border: 1px solid #ddd;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 1.5em;
      color: #333;
    }

    button.main-btn {
      width: 100%;
      padding: 15px;
      font-size: 1em;
      background-color: #333;
      color: white;
      border: none;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button.main-btn:hover {
      background-color: #555;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
    }

    .modal-content {
      background-color: white;
      margin: 10% auto;
      padding: 30px;
      border: 1px solid #888;
      width: 80%;
      max-width: 600px;
      border-radius: 5px;
    }

    .modal-title {
      font-size: 1.3em;
      font-weight: bold;
      margin-bottom: 20px;
      color: #333;
    }

    .location-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }

    .location-btn {
      padding: 12px;
      background-color: #f0f0f0;
      border: 2px solid #ccc;
      cursor: pointer;
      border-radius: 4px;
      text-align: center;
      font-size: 0.95em;
      transition: all 0.2s;
    }

    .location-btn:hover {
      background-color: #e0e0e0;
      border-color: #333;
    }

    .modal-close-btn {
      width: 100%;
      padding: 10px;
      background-color: #999;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }

    .modal-close-btn:hover {
      background-color: #777;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Shitty Stock System</h1>
    <button class="main-btn" onclick="searchStock()">Search Stock</button>
    <button class="main-btn" onclick="promptForMoveStock()">Move Stock</button>
    <button class="main-btn" onclick="showMultiScanModal('preferred')">Set Preferred Pick</button>
    <button class="main-btn" onclick="showMultiScanModal('threshold')">Set Replen Thresholds</button>
    <button class="main-btn" onclick="replenReport()">Generate Replen Report</button>
    <button class="main-btn" onclick="preferredPickReport()">Preferred Pick Report</button>
  </div>

  <div id="locationModal" class="modal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle"></div>
      <div class="location-buttons" id="locationButtons"></div>
      <button class="modal-close-btn" onclick="closeLocationModal()">Cancel</button>
    </div>
  </div>

  <div id="scanModal" class="modal">
    <div class="modal-content">
      <div class="modal-title" id="scanModalTitle">Scan Product SKU</div>
      <p id="hintMessage"
        style="font-size: 0.95em; color: #666; margin: 0 0 15px 0; font-style: italic; display: none;"></p>
      <div id="scanContainer" style="position: relative; width: 100%; margin-bottom: 15px;">
        <div id="cameraFeed" style="width: 100%; height: 250px; border: 2px solid #333;"></div>
        <div id="scanStatus"
          style="text-align: center; padding: 20px; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 4px;">
          <p id="statusMessage">Preparing camera...</p>
          <p id="scannedValue"
            style="font-weight: bold; font-size: 1.2em; color: #333; margin-top: 10px; display: none;"></p>
        </div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button class="modal-close-btn" onclick="cancelScan()" style="flex: 1;">Cancel</button>
        <button id="torchBtn" style="display:none;">Toggle Torch</button>
        <button id="manualInputBtn"
          style="flex: 1; padding: 10px; background-color: #666; color: white; border: none; cursor: pointer; border-radius: 4px;"
          onclick="manualInput()">Manual Input</button>
        <button id="confirmScanBtn"
          style="flex: 1; padding: 10px; background-color: #333; color: white; border: none; cursor: pointer; border-radius: 4px; display: none;"
          onclick="confirmScan()">Confirm</button>
      </div>
    </div>
  </div>

  <div id="replenModal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-title">Replenishment Report</div>
      <div style="max-height: 400px; overflow-y: auto; margin-bottom: 15px;">
        <table id="replenTable" style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr>
              <th style="border: 1px solid #ddd; padding: 8px;">SKU</th>
              <th style="border: 1px solid #ddd; padding: 8px;">Preferred Pick</th>
              <th style="border: 1px solid #ddd; padding: 8px;">Other Locations</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <button class="modal-close-btn" onclick="closeReplenModal()">Close</button>
    </div>
  </div>

  <div id="multiScanModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-title" id="multiScanTitle"></div>
      <div id="thresholdSection">
        <label id="multiScanLabel"></label><br>
        <input type="number" id="thresholdValue" style="width: 100%; margin-bottom: 10px;"><br>
      </div>
      <label>SKUs (scanned or typed):</label><br>
      <textarea id="multiScanSkuInput" rows="5" style="width: 100%; margin-bottom: 10px;"></textarea><br>
      <div id="multiScanCamera" style="width: 100%; border: 2px solid #333; margin-bottom: 10px;"></div>
      <div style="display: flex; gap: 10px;">
        <button onclick="removeLastScannedSku()"
          style="flex: 1; padding: 10px; background-color: #999; color: white; border: none; cursor: pointer;">Remove
          last scanned SKU</button>
        <button onclick="confirmMultiScan()"
          style="flex: 1; padding: 10px; background-color: #333; color: white; border: none; cursor: pointer;">Confirm</button>
        <button onclick="closeMultiScanModal()"
          style="flex: 1; padding: 10px; background-color: #999; color: white; border: none; cursor: pointer;">Cancel</button>
      </div>
    </div>
  </div>

  <div id="stockResultModal" class="modal">
    <div class="modal-content">
      <div id="stockResultTitle"></div>
      <div id="stockResultBody"></div>
      <button onclick="closeStockModal()">Close</button>
    </div>
  </div>

  <div id="preferredPickModal" class="modal">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-title">Preferred Pick Report</div>
      <div style="max-height: 400px; overflow-y: auto; margin-bottom: 15px;">
        <table id="preferredPickTable" style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr>
              <th style="border: 1px solid #ddd; padding: 8px;">Location</th>
              <th style="border: 1px solid #ddd; padding: 8px;">SKU</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <button class="modal-close-btn" onclick="closePreferredPickModal()">Close</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    let html5QrCode;
    let preferredLocations = {};
    let cleanedValue = null;
    let scannedValue = null;
    let currentScanType = 'sku'; // 'sku' or 'location'

    // Load existing preferred locations on page load
    window.addEventListener('DOMContentLoaded', loadPreferredLocations);

    async function loadPreferredLocations() {
      try {
        const response = await fetch('/api/preferred-locations');
        if (response.ok) {
          preferredLocations = await response.json();
        }
      } catch (error) {
        console.error('Error loading preferred locations:', error);
      }
    }

    async function showScanModal(type = 'sku', hint = null) {
      return new Promise((resolve) => {
        const modal = document.getElementById('scanModal');
        const statusMsg = document.getElementById('statusMessage');
        const scannedValueEl = document.getElementById('scannedValue');
        const hintMsg = document.getElementById('hintMessage');

        // Reset state
        scannedValue = null;
        cleanedValue = null;
        currentScanType = type;
        window.scanResolve = resolve;

        // UI setup
        modal.style.display = 'block';

        document.getElementById('scanModalTitle').textContent =
          type === 'sku' ? 'Scan Product SKU' : 'Scan Location';

        document.getElementById('confirmScanBtn').style.display = 'none';
        scannedValueEl.style.display = 'none';

        if (hint) {
          hintMsg.textContent = hint;
          hintMsg.style.display = 'block';
        } else {
          hintMsg.style.display = 'none';
        }

        statusMsg.textContent = 'Starting camera...';

        setTimeout(() => {

          try {
            // Clean up previous scanner if exists
            if (html5QrCode) {
              html5QrCode.stop().then(() => {
                html5QrCode.clear();
              }).catch(() => { });
              html5QrCode = null;
            }

            // Create scanner
            html5QrCode = new Html5Qrcode("cameraFeed");

            html5QrCode.start(
              { facingMode: "environment" },
              { fps: 10, qrbox: { width: 250, height: 250 } },

              (decodedText) => {
                scannedValue = decodedText.toUpperCase();
                if (scannedValue.length > 0) {
                  cleanedValue = scannedValue.slice(1);
                }

                statusMsg.textContent = "✓ Scanned Successfully!";
                scannedValueEl.textContent = cleanedValue;
                scannedValueEl.style.display = 'block';

                // auto confirm
                setTimeout(() => confirmScan(), 1000);
              },

              () => {
                // ignore scan errors (normal)
              }

            ).then(() => {
              statusMsg.textContent = "Camera ready - point at code";

            }).catch(err => {
              console.error("Scanner start failed:", err);
              statusMsg.textContent = "Camera failed. Use manual input.";
            });

          } catch (err) {
            console.error("Camera error:", err);
            statusMsg.textContent = "Camera error. Use manual input.";
          }

        }, 300); // delay for iOS
      });
    }

    function confirmScan() {
      let value = null;

      // Priority 1: scanned value
      if (cleanedValue) {
        value = cleanedValue;
      }
      // Priority 2: manual input
      else if (scannedValue) {
        value = scannedValue;
      }

      if (!value) {
        alert("Please scan or enter a value");
        return;
      }

      closeScanModal();

      if (window.scanResolve) {
        window.scanResolve(value);
        window.scanResolve = null;
      }
    }

    function manualInput() {
      const inputType = currentScanType === 'sku' ? 'SKU' : 'Location';
      const input = prompt(`Enter ${inputType} manually:`);
      if (input && input.trim()) {
        scannedValue = input.trim().toUpperCase();
        const statusMsg = document.getElementById('statusMessage');
        const scannedValueEl = document.getElementById('scannedValue');
        statusMsg.textContent = '✓ Entered Successfully!';
        scannedValueEl.textContent = scannedValue;
        scannedValueEl.style.display = 'block';
        document.getElementById('confirmScanBtn').style.display = 'block';
      }
    }

    function cancelScan() {
      closeScanModal();
      window.scanResolve(null);
    }

    async function closeScanModal() {
      const modal = document.getElementById('scanModal');

      document.getElementById("torchBtn").style.display = "none";

      if (html5QrCode) {
        try {
          await html5QrCode.stop();
          await html5QrCode.clear();
        } catch (err) {
          console.log("Scanner stop error:", err);
        }
        html5QrCode = null;
      }

      modal.style.display = 'none';
      scannedValue = null;
    }

    function showLocationModal(locations, title) {
      return new Promise((resolve) => {
        const modal = document.getElementById('locationModal');
        const modalTitle = document.getElementById('modalTitle');
        const locationButtons = document.getElementById('locationButtons');

        modalTitle.textContent = title;
        locationButtons.innerHTML = '';

        locations.forEach(item => {
          const btn = document.createElement('button');
          btn.className = 'location-btn';
          btn.textContent = `${item.location} (${item.quantity} units)`;
          btn.onclick = () => {
            modal.style.display = 'none';
            resolve(item.location);
          };
          locationButtons.appendChild(btn);
        });

        modal.style.display = 'block';

        window.closeLocationModalResolve = () => {
          modal.style.display = 'none';
          resolve(null);
        };
      });
    }

    function closeLocationModal() {
      document.getElementById('locationModal').style.display = 'none';
      if (window.closeLocationModalResolve) {
        window.closeLocationModalResolve();
      }
    }

    async function showMultiScanModal(mode) {
      const modal = document.getElementById('multiScanModal');
      const textarea = document.getElementById('multiScanSkuInput');
      const video = document.getElementById('multiScanCamera');

      const thresholdSection = document.getElementById('thresholdSection');
      document.getElementById('thresholdValue').value = '';

      thresholdSection.style.display = (mode === 'preferred') ? 'none' : 'block';

      const title = document.getElementById('multiScanTitle');
      const label = document.getElementById('multiScanLabel');

      if (mode === 'preferred') {
        title.textContent = 'Set Preferred Pick';
        label.textContent = 'Scan SKUs to set preferred pick location:';
      } else {
        title.textContent = 'Set Replenishment Thresholds';
        label.textContent = 'Enter threshold:';
      }

      modal.style.display = 'block';
      textarea.value = '';
      video.style.display = 'block';

      const scannedSkus = [];
      const scannedSet = new Set();

      window.scannedSkus = scannedSkus;
      window.scannedSet = scannedSet;

      scannedValue = null;
      // Start scanner
      setTimeout(async () => {
        try {
          if (html5QrCode) {
            try { await html5QrCode.stop(); await html5QrCode.clear(); } catch { }
          }
          html5QrCode = new Html5Qrcode("multiScanCamera");

          await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
              scannedValue = decodedText.toUpperCase();
              let cleaned = null;

              if (scannedValue.length > 0) {
                cleaned = scannedValue.slice(1);
              }

              if (!cleaned) return;
              if (!scannedSet.has(cleaned)) {
                scannedSet.add(cleaned);
                scannedSkus.push(cleaned);
                textarea.value = scannedSkus.join(', ');
              }
            },
            () => { }
          );
        } catch (err) {
          console.error('Scanner error:', err);
          alert('Camera not available.');
        }
      }, 300);

      // Wait for user to confirm
      const skuList = await new Promise(resolve => {
        window.multiScanResolve = resolve;
      });

      // Stop scanner
      try {
        await html5QrCode.stop();
        await html5QrCode.clear();
        html5QrCode = null;
      } catch { }

      await new Promise(res => setTimeout(res, 300));
      modal.style.display = 'none';

      if (!skuList || skuList.length === 0) return;

      if (mode === 'preferred') {

        // Scan location
        const location = await showScanModal('location');
        if (!location) return;

        const locationUpper = location.toUpperCase();

        // Validate location
        const locResponse = await fetch('/api/locations');
        const locations = await locResponse.json();

        if (!locations.includes(locationUpper)) {
          alert(`Location '${locationUpper}' does not exist`);
          return;
        }

        // Existing check
        const existing = skuList.filter(sku => preferredLocations[sku]);

        if (existing.length > 0) {
          const confirmed = confirm(
            `${existing.length} SKUs already have preferred picks.\nOverwrite with ${locationUpper}?`
          );
          if (!confirmed) return;
        }

        // Preview
        const preview = skuList.slice(0, 10).join(', ');
        if (!confirm(`Set ${locationUpper} for:\n${preview}?`)) return;

        // Save
        let success = 0;
        for (const sku of skuList) {
          try {
            const res = await fetch('/api/preferred-locations', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ sku, location: locationUpper })
            });

            if (res.ok) {
              preferredLocations[sku] = locationUpper;
              success++;
            }
          } catch { }
        }

        alert(`Updated ${success}/${skuList.length} SKUs`);
      }

      if (mode === 'threshold') {

        const value = document.getElementById('thresholdValue').value;
        const threshold = parseInt(value);

        if (isNaN(threshold) || threshold < 0) {
          alert('Please enter a valid threshold');
          return;
        }

        try {
          const res = await fetch('/api/replen-thresholds', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ skus: skuList, threshold })
          });

          if (res.ok) {
            alert(`Threshold set for ${skuList.length} SKUs`);
          } else {
            alert('Failed to set thresholds');
          }
        } catch {
          alert('Error setting thresholds');
        }
      }
    }

    function confirmMultiScan() {
      let skuList = [];

      // Prefer scanned SKUs if they exist
      if (window.scannedSkus && window.scannedSkus.length > 0) {
        skuList = window.scannedSkus;
      } else {
        // fallback to manual input
        const textarea = document.getElementById('multiScanSkuInput');
        skuList = textarea.value
          .split(',')
          .map(s => s.trim().toUpperCase())
          .filter(s => s.length > 0);
      }

      if (!skuList.length) {
        alert("No SKUs entered");
        return;
      }

      if (window.multiScanResolve) {
        window.multiScanResolve(skuList);
        window.multiScanResolve = null;
      }
    }

    function removeLastScannedSku() {
      if (!window.scannedSkus || window.scannedSkus.length === 0) return;

      const removed = window.scannedSkus.pop();
      window.scannedSet.delete(removed);

      const textarea = document.getElementById('multiScanSkuInput');
      textarea.value = window.scannedSkus.join(', ');
    }

    async function promptForMoveStock() {
      const sku = await showScanModal('sku');
      if (sku === null) return;

      if (!sku.trim()) {
        alert('Please scan a valid SKU');
        return;
      }

      const skuUpper = sku.toUpperCase();

      // Check if SKU exists
      try {
        const skuResponse = await fetch(`/api/sku/${skuUpper}`);
        if (!skuResponse.ok) {
          const errorData = await skuResponse.json();
          alert(errorData.error || `SKU '${skuUpper}' not found`);
          return;
        }
      } catch (error) {
        alert('Error: ' + error.message);
        return;
      }

      // Fetch inventory to find locations with stock for this SKU
      try {
        const response = await fetch('/inventory');
        if (!response.ok) throw new Error('Failed to fetch inventory');

        const inventory = await response.json();
        const locationsWithStock = inventory
          .filter(item => item.sku === skuUpper && item.quantity > 0)
          .map(item => ({ location: item.location, quantity: item.quantity }));

        if (locationsWithStock.length === 0) {
          alert(`No stock found for SKU: ${skuUpper}`);
          return;
        }

        const fromLocation = await showLocationModal(locationsWithStock, `Select from location for ${skuUpper}:`);
        if (!fromLocation) return;

        // Get preferred location for this SKU if it exists
        const preferredHint = preferredLocations[skuUpper]
          ? `Preferred pick location for ${skuUpper}: ${preferredLocations[skuUpper]}`
          : null;

        const toLocation = await showScanModal('location', preferredHint);
        if (toLocation === null) return;

        const quantityStr = prompt('Enter quantity:');
        if (quantityStr === null) return;

        const quantity = parseInt(quantityStr);
        if (isNaN(quantity) || quantity <= 0) {
          alert('Please enter a valid quantity');
          return;
        }

        try {
          const moveResponse = await fetch('/move-stock', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              sku: skuUpper,
              fromLocation: fromLocation.toUpperCase(),
              toLocation: toLocation.toUpperCase(),
              quantity
            })
          });

          const data = await moveResponse.json();

          if (!moveResponse.ok) throw new Error(data.error || 'Failed to move stock');

          let message = `Stock moved successfully!\n${skuUpper}: ${quantity} units from ${fromLocation.toUpperCase()} to ${toLocation.toUpperCase()}`;
          if (data.warning) {
            message += `\n\nWarning: ${data.warning}`;
          }
          alert(message);
        } catch (error) {
          alert('Error: ' + error.message);
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }

    async function replenReport() {
      const modal = document.getElementById('replenModal');
      const tableBody = document.querySelector('#replenTable tbody');

      tableBody.innerHTML = '';

      try {
        const response = await fetch('/api/replen-report');
        if (!response.ok) throw new Error('Failed to fetch replenishment report');

        const data = await response.json();

        if (data.length === 0) {
          const row = document.createElement('tr');
          row.innerHTML = `<td colspan="4" style="text-align:center; padding:10px;">All SKUs are above thresholds or have no preferred pick.</td>`;
          tableBody.appendChild(row);
        } else {
          data.forEach(item => {

            const row = document.createElement('tr');
            row.innerHTML = `
          <td>${item.sku}</td>
          <td>${item.preferredPick} (${item.preferredQty})</td>
          <td>${item.otherLocations}</td>
        `;
            tableBody.appendChild(row);
          });
        }

        modal.style.display = 'block';
      } catch (error) {
        alert('Error loading replenishment report: ' + error.message);
      }
    }

    function closeReplenModal() {
      document.getElementById('replenModal').style.display = 'none';
    }

    async function closeMultiScanModal() {
      const modal = document.getElementById('multiScanModal');

      // Stop scanner safely
      if (html5QrCode) {
        try {
          await html5QrCode.stop();
          await html5QrCode.clear();
        } catch (err) {
          console.warn("Scanner cleanup failed:", err);
        }
        html5QrCode = null;
      }

      modal.style.display = 'none';

      // Prevent hanging promise
      if (window.multiScanResolve) {
        window.multiScanResolve(null);
        window.multiScanResolve = null;
      }
    }

    async function searchStock() {
      const sku = await showScanModal('sku');

      if (!sku) return;

      const cleanedSku = sku.toUpperCase();

      await showStockResults(cleanedSku);
    }

    async function showStockResults(sku) {
      try {
        const res = await fetch(`/api/stock/${sku}`);

        if (!res.ok) {
          alert(`No stock found for ${sku}`);
          return;
        }

        const data = await res.json();

        renderStockModal(sku, data);

      } catch (err) {
        console.error(err);
        alert("Error fetching stock");
      }
    }

    function renderStockModal(sku, locations) {
      const modal = document.getElementById('stockResultModal');
      const title = document.getElementById('stockResultTitle');
      const body = document.getElementById('stockResultBody');

      title.textContent = `Stock for ${sku}`;

      const preferred = preferredLocations[sku];

      let preferredHtml = '';

      if (preferred) {
        preferredHtml = `
      <div style="
        padding: 8px;
        margin-bottom: 10px;
        background: #1e3a1e;
        border: 1px solid #4caf50;
        color: #a5d6a7;
        font-weight: bold;
      ">
        Preferred Pick: ${preferred}
      </div>
    `;
      }

      if (!locations || locations.length === 0) {
        body.innerHTML = preferredHtml + "<p>No stock found</p>";
      } else {
        const listHtml = locations.map(loc => `
      <div style="padding: 5px; border-bottom: 1px solid #ccc;">
        <strong>${loc.location}</strong> — Qty: ${loc.quantity}
      </div>
    `).join('');

        body.innerHTML = preferredHtml + listHtml;
      }

      modal.style.display = 'block';
    }

    function closeStockModal() {
      document.getElementById('stockResultModal').style.display = 'none';
    }

    async function preferredPickReport() {
      const modal = document.getElementById('preferredPickModal');
      const tableBody = document.querySelector('#preferredPickTable tbody');

      tableBody.innerHTML = '';

      try {
        const response = await fetch('/api/preferred-pick-report');
        if (!response.ok) throw new Error('Failed to fetch preferred pick report');

        const data = await response.json();
        console.log(data)

        if (data.length === 0) {
          const row = document.createElement('tr');
          row.innerHTML = `<td colspan="3" style="text-align:center; padding:10px;">No preferred pick locations set.</td>`;
          tableBody.appendChild(row);
        } else {
          data.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
          <td style="border: 1px solid #ddd; padding: 8px;">${item.location}</td>
          <td style="border: 1px solid #ddd; padding: 8px;">${item.skus}</td>
        `;
            tableBody.appendChild(row);
          });
        }

        modal.style.display = 'block';
      } catch (error) {
        alert('Error loading preferred pick report: ' + error.message);
      }
    }

    function closePreferredPickModal() {
      document.getElementById('preferredPickModal').style.display = 'none';
    }
  </script>
</body>

</html>
